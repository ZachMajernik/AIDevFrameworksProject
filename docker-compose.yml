#This docker file was somewhat generated by Github copilot, 
#I coppied stuff over from the in-class demo and had copilot look it over and add anything that was missing
services:
  front_end:
    build:
      context: .
      dockerfile: front_end/Dockerfile
    environment:
      - API_BASE_URL=http://back_end:8000
    ports:
      - "3000:3000"
    depends_on:
      - back_end
    networks:
      - AIDevFrameworksProject
    volumes:
      - ./front_end:/app/front_end

  back_end:
    build:
      context: .
      dockerfile: back_end/Dockerfile
    environment:
      - MONGODB_URI=mongodb://db:27017
      - MONGODB_DB=AIDevFrameworksProject
      - MONGODB_COLLECTION=items
    ports:
      - "8000:8000"
    depends_on:
      model-service:
        condition: service_healthy
      db: 
        condition: service_healthy
    networks:
      - AIDevFrameworksProject
    volumes:
      - ./back_end:/app/back_end

  model-service:
    build: ./model_service
    ports:
      - "8001:8001"
    networks:
      - AIDevFrameworksProject
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  
  db:
    container_name: db
    image: mongo:latest
    networks:
      - AIDevFrameworksProject
    volumes:
      - ./mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  AIDevFrameworksProject:
    driver: bridge